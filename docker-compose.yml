services:

  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: intelligent-tm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-intelligent-tm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intelligent-tm"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── postgres-mcp SSE Server ───────────────────────────────────────
  postgres-mcp:
    image: crystaldba/postgres-mcp
    container_name: intelligent-tm-mcp
    restart: unless-stopped
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-intelligent-tm}
    ports:
      - "8002:8000"
    command: ["--access-mode=unrestricted", "--transport=sse"]
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Express Backend ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: intelligent-tm-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-intelligent-tm}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-intelligent-tm}?sslmode=disable
      PGSSLMODE: disable
      MCP_URL: http://postgres-mcp:8000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-avatars}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-mcp:
        condition: service_started
    volumes:
      - ./src/migrations:/app/src/migrations:ro

  # ─── Minio Service ───────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: intelligent-tm-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: